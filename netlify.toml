[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"

[[redirects]]
  from = "/api/properties/*"
  to = "/.netlify/functions/properties?propertyId=:splat"
  status = 200
  force = true

[[redirects]]
  from = "/api/properties"
  to = "/.netlify/functions/properties"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
